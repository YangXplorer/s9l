version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: s9l
    main: ./cmd/s9l
    binary: s9l
    env:
      - CGO_ENABLED=0 # pure-Go drivers; keeps cross-compilation and a single static binary
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  github:
    owner: YangXplorer
    name: s9l
  prerelease: auto # tags like v0.1.0-rc.1 are marked as pre-releases

homebrew_casks:
  - name: s9l
    repository:
      owner: YangXplorer
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/YangXplorer/s9l"
    description: "Fast terminal database client (SQLite, PostgreSQL, MySQL) with a TUI"
    # Don't update the tap for pre-releases (rc/beta tags).
    skip_upload: auto
    # Clear the quarantine xattr so the unsigned binary runs without a Gatekeeper prompt.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/s9l"]
          end

# deb/rpm and docker land later — see docs/RELEASE.md.
